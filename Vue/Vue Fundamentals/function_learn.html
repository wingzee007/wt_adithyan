<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
</head>
<body>
    <div id="app">
        <h1>{{intro}}</h1>
        <h1>{{para()}}</h1>
        <h1>Random Number is {{RandomNumber()}}</h1>
    </div>

<script>
    app=Vue.createApp({
        data(){
            const msg = "hai thre i am klearning vue"
            const intro = "Learn Function"
            const num = Math.floor(Math.random()*10)+1
            function RandomNumber()
            {
                return num
            }
            function para(){
                return msg.toUpperCase();
            }

            return{
                intro,RandomNumber,para
            }
        }
    }).mount("#app")
</script>
</body>
</html>
