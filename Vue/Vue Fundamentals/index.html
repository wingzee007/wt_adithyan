<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>{{first}}</h1>
        <h2>{{message}}</h2>
        <h2>Lucky Number is :{{num%2==0?"Even number": "Odd number"}}</h2>
        <p>Numbers Are : {{numbers[2]}}</p>
        <p>{{details.name}} Id is {{details.id}}</p>
        
    </div>
</body>

<script>
    const app = Vue.createApp({  
    data() {
        const message = "hello vue"
        const num = 334
        const numbers = [1,3,2,4,,55,6666]
        const details = { //object
            name:"acs",
            id:444,
            place:"my place"
        }

        return {
            message,num,numbers,details,
            first:"Learn Vue" ,
        };
    },
}).mount('#app');//we want to connect app to html the name (id selector)
</script>
</html>
