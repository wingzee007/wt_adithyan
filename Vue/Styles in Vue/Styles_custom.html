<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <span v-bind:style="somestyle">
            Random Style Binding
        </span>
    </div>
</body>
<script>
    const {createApp,ref} = Vue;
    createApp({
        data()
        {
            const somestyle = {
               fontSize: "40px", 
               backgroundColor: "lightgreen",
               border : "2px solid red",
               margin : "20px"
            }
            return{somestyle};
        }
    }).mount("#app")
</script>
</html>
