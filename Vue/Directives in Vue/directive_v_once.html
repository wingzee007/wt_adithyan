<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
</head>
<body>
    <div id="app">
        <h2>Number is :{{number()}}</h2>
        <h2 v-once >Once Number is :{{number()}}</h2>
    </div>

    <Script>
        const {createApp,ref} = Vue;
        createApp({
            data(){
                let num = ref(77);  

                function number(){
                    setTimeout(()=>{num.value=1000},2000);
                    return num.value;
                }

                return{number}
              }
        }).mount("#app")
    </Script>
</body>
</html>
